# =============================================================================
# Grafana Dashboard Provisioning
# =============================================================================
# Tells Grafana where to find dashboard JSON files and how to load them.
# Dashboards are loaded from the container path below, which maps to
# ./grafana/dashboards on the host via docker-compose volume mount.
#
# Docs: https://grafana.com/docs/grafana/latest/administration/provisioning/
# =============================================================================

apiVersion: 1

providers:
  - name: 'grafana-monitoring-stack'
    orgId: 1
    type: file
    disableDeletion: true       # Prevent dashboards being deleted from the UI
    updateIntervalSeconds: 30   # Poll for JSON changes every 30s (useful in dev)
    allowUiUpdates: false       # Prevent UI edits — source of truth is the JSON file
    options:
      # Path inside the Grafana container — mapped from ./grafana/dashboards
      # via the volume in docker-compose.yml:
      #   - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Add a second volume for dashboards:
      #   - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true   # Subdirectories become dashboard folders