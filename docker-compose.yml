# =============================================================================
# Grafana Monitoring Stack — Production Docker Compose
# =============================================================================
# Required .env variables:
#   GRAFANA_ADMIN_PASSWORD      - Grafana admin password (required)
#   GF_SERVER_DOMAIN            - Grafana domain (e.g. grafana.example.com)
#   GF_SERVER_ROOT_URL          - Grafana root URL (e.g. https://grafana.example.com)
#   SMTP_FROM                   - Alertmanager SMTP from address
#   SMTP_USERNAME               - Alertmanager SMTP username
#   SMTP_PASSWORD               - Alertmanager SMTP password
#   ALERT_EMAIL_TO              - Default alert recipient email
#   ALERT_EMAIL_TO_CRITICAL     - Critical alert recipient email
#
# Optional .env variables (defaults shown):
#   GRAFANA_ADMIN_USER          - Grafana admin username (default: admin)
#   PROMETHEUS_RETENTION        - Prometheus data retention (default: 15d)
#   GF_SERVER_SERVE_FROM_SUB_PATH - Serve from sub path (default: false)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics collection & storage
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    restart: unless-stopped
    user: "65534:65534"  # Run as nobody:nobody (non-root)
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
      # NOTE: --web.enable-lifecycle exposes /-/reload endpoint.
      # It is safe here because ports are bound to 127.0.0.1 (loopback only),
      # but ensure your reverse proxy does NOT expose this path externally.
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.0'
        reservations:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Grafana — Metrics visualisation
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    restart: unless-stopped
    user: "472:472"  # Run as grafana user (non-root)
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_METRICS_ENABLED=true
      - GF_SERVER_DOMAIN=${GF_SERVER_DOMAIN}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_SERVER_SERVE_FROM_SUB_PATH=${GF_SERVER_SERVE_FROM_SUB_PATH:-false}
      # Harden cookies for production (requires HTTPS)
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
      # Disable Grafana telemetry / analytics reporting
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.5'
        reservations:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Alertmanager — Alert routing & notification
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    user: "65534:65534"  # Run as nobody:nobody (non-root)
    volumes:
      # config.yml.tmpl is your template; the entrypoint renders it to config.yml at startup
      - ./alertmanager/config.yml.tmpl:/etc/alertmanager/config.yml.tmpl:ro
      - alertmanager_data:/alertmanager
    # Use a shell entrypoint to substitute env vars into the config template,
    # then start alertmanager with the rendered config.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        envsubst < /etc/alertmanager/config.yml.tmpl > /tmp/alertmanager-config.yml && \
        /bin/alertmanager \
          --config.file=/tmp/alertmanager-config.yml \
          --storage.path=/alertmanager
    environment:
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO}
      - ALERT_EMAIL_TO_CRITICAL=${ALERT_EMAIL_TO_CRITICAL}
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
        reservations:
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Node Exporter — Host system metrics
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: node-exporter
    restart: unless-stopped
    pid: host  # Required for accurate process metrics
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--web.listen-address=0.0.0.0:9100'
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
        reservations:
          memory: 32m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  prometheus_data:
    labels:
      backup: "true"
      project: "grafana-monitoring-stack"
  grafana_data:
    labels:
      backup: "true"
      project: "grafana-monitoring-stack"
  alertmanager_data:
    labels:
      backup: "true"
      project: "grafana-monitoring-stack"

# =============================================================================
# Networks
# =============================================================================
networks:
  monitoring:
    driver: bridge
    # internal: true blocks outbound internet access from all containers.
    # Uncomment if your services don't need to reach external endpoints
    # (e.g. Alertmanager SMTP relay is external — leave commented in that case).
    # internal: true
    labels:
      project: "grafana-monitoring-stack"